<!DOCTYPE html>

<meta charset="UTF-8">

<title>プロレス大河タイムライン</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a0e00 0%, #1a1200 100%); padding: 20px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2d2010; }
  header h1 { font-size: 1.3rem; font-weight: 900; color: #f6ad55; flex: 1; letter-spacing: 0.04em; }
  #data-meta { font-size: 0.72rem; color: #4a5568; }
  #controls { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 24px; background: #13100a; border-bottom: 1px solid #2d2010; justify-content: center; }
  .filter-btn { padding: 5px 16px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; background: #1e1810; color: #a0aec0; }
  .filter-btn:hover { background: #2d2418; color: #e2e8f0; }
  .filter-btn.active { color: #fff; }
  #main { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; position: relative; }
  #main::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, transparent, #2d2010 60px, #2d2010 calc(100% - 60px), transparent); transform: translateX(-50%); }
  .year-label { text-align: center; position: relative; z-index: 2; margin: 32px 0 8px; }
  .year-label span { display: inline-block; background: #1a1200; border: 1px solid #4a3a20; padding: 4px 16px; border-radius: 12px; font-size: 0.8rem; color: #a07840; font-weight: 700; letter-spacing: 0.08em; }
  .event-row { display: flex; align-items: flex-start; margin: 20px 0; position: relative; }
  .event-row.left  { flex-direction: row-reverse; }
  .event-row.right { flex-direction: row; }
  .event-card { width: calc(50% - 40px); background: #1a1410; border: 1px solid #2d2010; border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative; }
  .event-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .event-row.right .event-card::before { content: ''; position: absolute; right: -10px; top: 16px; border: 5px solid transparent; border-left-color: #2d2010; }
  .event-row.left  .event-card::before { content: ''; position: absolute; left: -10px; top: 16px; border: 5px solid transparent; border-right-color: #2d2010; }
  .event-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent, #f6ad55); border: 3px solid #0f1117; position: absolute; left: 50%; top: 18px; transform: translateX(-50%); z-index: 3; }
  .event-dot.range { border-radius: 4px; }
  .card-group { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .card-title { font-size: 1rem; font-weight: 700; color: #e2e8f0; line-height: 1.4; }
  .card-date  { font-size: 0.78rem; color: #718096; margin-top: 4px; }
  .card-detail { font-size: 0.82rem; color: #a0aec0; margin-top: 8px; line-height: 1.6; display: none; border-top: 1px solid #2d2010; padding-top: 8px; }
  .event-card.open .card-detail { display: block; }
  .card-img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 180px; object-fit: cover; display: none; }
  .event-card.open .card-img { display: block; }
  a.card-link { display: inline-block; margin-top: 8px; font-size: 0.78rem; color: #f6ad55; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  a.card-link:hover { border-color: #f6ad55; }
  @media (max-width: 600px) {
    #main::before { left: 20px; }
    .event-row { flex-direction: column !important; padding-left: 44px; }
    .event-card { width: 100%; }
    .event-dot { left: 20px; }
    .event-row.right .event-card::before, .event-row.left .event-card::before { display: none; }
  }
</style>
</head>

End Year":"","End Month":"","End Day":"","End Time":"","Display Date":"","Title":"ビル・ロビンソン、逝去","Detail":"","URL":"","Image URL":"","Image Credit":"","Type":"","Color":""},{"Group":"人物","Year":"1938","Month":"9","Day":"18","Time":"","End Year":"2014","End Month":"3","End Day":"3","End Time":"","Display Date":"","Title":"ビル・ロビンソン","Detail":"","URL":"","Image URL":"","Image Credit":"","Type":"","Color":""}];
const GROUP_COLORS = {};
const PALETTE = ['#f6ad55','#68d391','#63b3ed','#b794f4','#fc8181','#76e4f7','#fbd38d'];
let colorIdx = 0;
function groupColor(g) { if (!GROUP_COLORS[g]) GROUP_COLORS[g] = PALETTE[colorIdx++ % PALETTE.length]; return GROUP_COLORS[g]; }
function toYear(r) { return parseInt(r.Year) || 0; }
function toEndYear(r) { return parseInt(r['End Year']) || null; }
function toSortKey(r) { return (parseInt(r.Year)||0)*10000 + (parseInt(r.Month)||0)*100 + (parseInt(r.Day)||0); }
function formatDate(r, p) { p=p||''; const y=r[p+'Year'],m=r[p+'Month'],d=r[p+'Day']; if(!y)return''; return y+'年'+(m?m+'月':'')+(d?d+'日':''); }
function buildTimeline(rows, filter) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const visible = (filter === 'ALL' ? rows : rows.filter(r => r.Group === filter)).slice().sort((a,b) => toSortKey(a)-toSortKey(b));
  if (!visible.length) { main.innerHTML = '<p style="text-align:center;color:#718096;padding:40px">データがありません</p>'; return; }
  let lastDecade = null, side = 0;
  visible.forEach(row => {
    const decade = Math.floor(toYear(row)/10)*10;
    const accent = groupColor(row.Group);
    if (decade !== lastDecade) { lastDecade=decade; const l=document.createElement('div'); l.className='year-label'; l.innerHTML='<span>'+decade+'年代</span>'; main.appendChild(l); }
    const rowEl = document.createElement('div');
    rowEl.className = 'event-row '+(side++%2===0?'right':'left');
    rowEl.style.setProperty('--accent', accent);
    const dot = document.createElement('div');
    dot.className = 'event-dot'+(toEndYear(row)?' range':'');
    dot.style.background = accent;
    rowEl.appendChild(dot);
    const card = document.createElement('div');
    card.className = 'event-card';
    card.style.setProperty('--accent', accent);
    const sd = row['Display Date'] || formatDate(row,'');
    const ed = toEndYear(row) ? formatDate(row,'End ') : '';
    const lk = row.URL ? '<a class="card-link" href="'+row.URL+'" target="_blank" rel="noopener">詳細を見る →</a>' : '';
    const im = row['Image URL'] ? '<img class="card-img" src="'+row['Image URL']+'" alt="'+row.Title+'" loading="lazy">' : '';
    card.innerHTML = '<div class="card-group">'+row.Group+'</div><div class="card-title">'+row.Title+'</div><div class="card-date">'+(ed?sd+' ～ '+ed:sd)+'</div>'+((row.Detail||lk||im)?'<div class="card-detail">'+(row.Detail?'<p>'+row.Detail+'</p>':'')+lk+im+'</div>':'');
    card.addEventListener('click', () => { if (card.querySelector('.card-detail')) card.classList.toggle('open'); });
    rowEl.appendChild(card);
    main.appendChild(rowEl);
  });
}
function buildControls(rows) {
  const ctrl = document.getElementById('controls');
  const groups = ['ALL', ...new Set(rows.map(r => r.Group))];
  let active = 'ALL';
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn'+(g==='ALL'?' active':'');
    btn.textContent = g==='ALL'?'すべて':g;
    const color = g==='ALL'?'#e2e8f0':groupColor(g);
    btn.style.borderColor = g==='ALL'?'#4a3a20':color;
    btn.style.color = color;
    btn.addEventListener('click', () => { ctrl.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); active=g; buildTimeline(rows,active); });
    ctrl.appendChild(btn);
  });
}
buildControls(ROWS);
buildTimeline(ROWS, 'ALL');
</script>
